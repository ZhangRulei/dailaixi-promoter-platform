  <script>
    const screens = [...document.querySelectorAll('[data-screen]')];
    const toast = document.querySelector('.toast'); let toastTimer; let balanceVisible = true;
    function switchScreen(name) { screens.forEach(screen => { const active = screen.dataset.screen === name; screen.classList.toggle('active', active); if(active) screen.querySelector('.scroll').scrollTop = 0; }); }
    function notify(message) { toast.textContent = message; toast.classList.add('show'); clearTimeout(toastTimer); toastTimer = setTimeout(() => toast.classList.remove('show'), 1700); }
    document.querySelectorAll('[data-nav]').forEach(button => button.addEventListener('click', () => switchScreen(button.dataset.nav)));
    document.querySelectorAll('[data-action]').forEach(button => button.addEventListener('click', event => { event.stopPropagation(); notify(button.dataset.action); }));
    document.querySelectorAll('[role="button"]').forEach(card => card.addEventListener('click', () => notify(card.dataset.action)));
    document.querySelector('[data-search-input]').addEventListener('keydown', event => { if(event.key === 'Enter') { notify(event.currentTarget.value.trim() ? `搜索：${event.currentTarget.value.trim()}` : '请输入商品名称'); event.currentTarget.blur(); }});
    document.querySelector('[data-toggle-balance]').addEventListener('click', () => { balanceVisible = !balanceVisible; document.querySelector('[data-balance]').textContent = balanceVisible ? '236.80' : '••••••'; document.querySelectorAll('[data-income]').forEach((item,index) => item.textContent = balanceVisible ? ['2,350.80','1,680.00','434.00'][index] : '••••'); });
    if(new URLSearchParams(location.search).get('screen') === 'profile') switchScreen('profile');
  </script>
