<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>黛莱皙推客平台 · 运营后台低保真原型</title>
  <link rel="stylesheet" href="./styles.css">
</head>
<body>
  <div class="prototype-shell">
    <aside class="sidebar" aria-label="后台导航">
      <div class="brand">
        <span class="brand-mark">黛</span>
        <span><strong>黛莱皙推客平台</strong><small>运营后台 · 低保真</small></span>
      </div>
      <nav class="primary-nav" id="primaryNav"></nav>
      <div class="sidebar-foot">
        <span>原型版本 v0.1</span>
        <a href="../homepage-lowfi/index.html">查看小程序原型</a>
      </div>
    </aside>

    <section class="main-shell">
      <header class="topbar">
        <div class="breadcrumb"><span>运营后台</span><i>/</i><strong id="breadcrumbTitle">首页</strong></div>
        <div class="topbar-meta"><span class="environment">演示环境</span><span>数据更新：07-22 17:30</span><button type="button" data-command="account">运营管理员⌄</button></div>
      </header>

      <main class="workspace">
        <div class="page-content" id="pageContent" aria-live="polite"></div>
      </main>
    </section>
  </div>

  <div class="operation-modal" id="detailDrawer" aria-hidden="true">
    <div class="operation-modal-mask" data-close-drawer></div>
    <section class="operation-modal-card" role="dialog" aria-modal="true" aria-labelledby="drawerTitle">
      <header><div><small id="drawerEyebrow">详情</small><h2 id="drawerTitle">详情</h2></div><button type="button" class="icon-button" data-close-drawer aria-label="关闭">×</button></header>
      <div class="operation-modal-body" id="drawerBody"></div>
      <footer><button class="button" type="button" data-close-drawer>关闭</button><button class="button primary" type="button" data-drawer-confirm>保存</button></footer>
    </section>
  </div>

  <div class="modal" id="confirmModal" aria-hidden="true">
    <div class="modal-mask" data-close-modal></div>
    <section class="modal-card" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
      <h2 id="modalTitle">确认操作</h2>
      <p id="modalMessage">确认执行当前操作？</p>
      <div class="modal-actions"><button class="button" type="button" data-close-modal>取消</button><button class="button primary" type="button" data-modal-confirm>确认</button></div>
    </section>
  </div>

  <div class="toast" id="toast" role="status" aria-live="polite"></div>
  <script src="./app.js"></script>
</body>
</html>
