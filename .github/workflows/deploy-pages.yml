name: Deploy prototypes to Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Prepare static prototype site
        run: |
          mkdir -p _site/prototype
          cp pages/index.html _site/index.html
          cp -R prototype/homepage-lowfi _site/prototype/homepage-lowfi
          cp -R prototype/miniapp-highfi _site/prototype/miniapp-highfi
          cp -R prototype/admin-lowfi _site/prototype/admin-lowfi
          find _site -name README.md -delete
          find _site -name package.json -delete
          find _site -name server.cjs -delete

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
